<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odysseus</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Overlay: shown while the server is stopped / starting / errored.
         Once the server is reachable, Rust navigates the whole webview to
         http://{host}:{port}/, replacing this page. -->
    <main id="content">
      <section id="overlay">
        <div class="overlay-card">
          <div class="overlay-logo" aria-hidden="true">
            <svg viewBox="0 0 32 32"><path d="M16 4L16 22L6 22Z" fill="currentColor"/><path d="M16 8L16 22L24 22Z" fill="currentColor" opacity="0.6"/><path d="M4 24Q10 20 16 24Q22 28 28 24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
          </div>
          <h1 id="overlayTitle">Server stopped</h1>
          <p id="overlayDetail">Press “Start” to launch the local Odysseus server.</p>
          <div class="overlay-actions">
            <button id="overlayAction" class="primary">Start server</button>
            <button id="settingsBtn" class="ghost">Settings</button>
            <button id="logsToggle" class="ghost">Show log</button>
          </div>
          <pre id="logBox" class="hidden"></pre>
        </div>
      </section>
    </main>

    <!-- Settings panel — modal overlay on top of #content. -->
    <section id="settings" class="hidden">
      <div class="settings-card">
        <div class="settings-head">
          <h2>Settings</h2>
          <button id="settingsClose" class="icon-btn" title="Close" aria-label="Close">
            <svg width="13" height="13" viewBox="0 0 11 11"><path d="M1 1 L10 10 M10 1 L1 10" stroke="currentColor" stroke-width="1.3" /></svg>
          </button>
        </div>

        <label class="field">
          <span>Odysseus folder</span>
          <div class="path-row">
            <input id="pathInput" type="text" spellcheck="false" placeholder="Select path to Odysseus folder" />
            <button id="browseBtn" class="ghost">Browse…</button>
          </div>
          <small id="pathHint" class="hint"></small>
        </label>

        <div class="field-row">
          <label class="field">
            <span>Host</span>
            <input id="hostInput" type="text" spellcheck="false" value="127.0.0.1" />
          </label>
          <label class="field narrow">
            <span>Port</span>
            <input id="portInput" type="number" min="1" max="65535" value="7000" />
          </label>
        </div>

        <label class="check">
          <input id="autoStartInput" type="checkbox" />
          <span>Start the server automatically when the app opens</span>
        </label>

        <div class="settings-actions">
          <button id="saveBtn" class="primary">Save</button>
          <button id="toggleBtn" class="server-btn">Start</button>
          <span id="saveNote" class="hint"></span>
        </div>
      </div>
    </section>

    <script src="main.js"></script>
  </body>
</html>
